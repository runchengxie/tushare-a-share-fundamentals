# 最小可运行配置。复制为 config.yml 后按需修改。

years: 10
recent_quarters: 4
data_dir: "data"

datasets:
  - name: income
    report_types: [1]

use_vip: true
max_per_minute: 90
max_retries: 3

state_backend: "auto"
state_path: null
storage_mode: "compact"

export_enabled: false
export_out_format: "csv"
export_out_dir: null
export_kinds: ""
export_annual_strategy: "cumulative"
export_engine: "pandas"
