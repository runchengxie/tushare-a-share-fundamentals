# 下载后自动导出模板。复制为 config.yml 后按需修改。

years: 10
recent_quarters: 4
data_dir: "data"

datasets:
  - name: income
    report_types: [1]
  - name: balancesheet
    report_types: [1]
  - name: cashflow
    report_types: [1]
  - name: forecast
  - name: express
  - name: fina_indicator
  - name: fina_mainbz
    type: ["P", "D", "I"]
  - name: disclosure_date

use_vip: true
max_per_minute: 90
max_retries: 3

state_backend: "auto"
state_path: null
storage_mode: "compact"

export_enabled: true
export_out_format: "csv"
export_out_dir: "data/export"
export_kinds: "annual,single,cumulative"
export_annual_strategy: "cumulative"
export_flat_datasets: "auto"
export_flat_exclude: ""
export_split_by: "none"
export_gzip: false
export_no_income: false
export_no_flat: false
export_engine: "pandas"
