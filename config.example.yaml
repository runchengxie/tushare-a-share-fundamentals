# 示例配置。复制为 config.yml 后按需修改。

# --- 时间窗口 ---
#
# 下载按季度执行。years: 10 表示最近约 40 个季度。
# 也可以注释 years，直接设置 quarters。
# 优先级：--since/--until > quarters > years。
#
# 审计意见可单独设置 audit_quarters/audit_years。
# 如果 --audit-only 未指定任何窗口，默认只下载最近 1 个季度。
#
years: 10
# quarters: 40
audit_quarters: 1
# audit_years: 1


# --- 数据刷新 ---
#
# recent_quarters 控制滚动刷新窗口。
# 默认重抓最近 4 个季度，用于吸收财报修订和披露日期变化。
# 设为 0 表示只补缺，不滚动刷新。
# skip_existing: true 会跳过已存在的分区。
#
recent_quarters: 4
# download 默认补缺，并执行 recent_quarters 指定的滚动刷新。
skip_existing: false

# --- fields（可选）：字段白名单 ---
#
# 留空时不传 fields 参数，由 API 返回所有字段。
# 这是推荐值，可减少字段漂移带来的维护成本。
# 设置后只请求列出的字段，适合控制带宽和磁盘占用。
# 格式为 TuShare 字段名，用逗号分隔。
#
# Example (common income-statement fields; for illustration only):
# fields: ts_code,ann_date,f_ann_date,end_date,report_type,comp_type,update_flag,total_revenue,revenue,total_cogs,operate_profit,total_profit,income_tax,n_income,n_income_attr_p,ebit,ebitda,rd_exp
#
# Default (all columns):
fields: ""


# --- 多数据集批量下载 ---
#
# report_types 控制财务报表口径。
# 默认只下载 report_type=1，即合并报表。
# 常用值：
# 1  合并报表
# 2  单季合并报表
# 6  母公司报表
# 完整取值见 README。

datasets:
  - name: income            # 利润表
    report_types: [1]       # 合并报表
  - name: balancesheet      # 资产负债表
    report_types: [1]       # 合并报表
  - name: cashflow          # 现金流量表
    report_types: [1]       # 合并报表
  - name: forecast          # 业绩预告
  - name: express           # 业绩快报
  # dividend 逐日抓取，默认不随常规 download 运行。
  # 如需下载，使用 `funda download --dividend-only`。
  - name: fina_indicator    # 财务指标
  - name: fina_audit        # 审计意见，逐股抓取，建议单独运行
  - name: fina_mainbz       # 主营业务构成
    type: ["P", "D", "I"]   # P=产品，D=地区，I=行业
  - name: disclosure_date   # 财报披露计划

data_dir: "data"

use_vip: true               # 优先使用 VIP 接口
max_per_minute: 90
max_retries: 3

# state_path 可覆盖增量状态路径。
# 留空时默认写入 <data_dir>/_state/state.json。
# 设置为 .db 后缀时使用 SQLite 后端。
# 删除状态文件或换一个 state_path 会触发重新计算下载计划。
# state_path: null


# --- 导出行为 ---
# 默认只写 parquet 缓存，不自动导出 CSV。
# 设置 export_enabled: true 后，download 完成会执行导出流程。
export_enabled: false
export_out_format: "csv"
export_out_dir: null  # 留空时写入 data/csv 或 data/parquet
export_kinds: ""
# 设为 "annual,single,cumulative" 可导出 income 派生口径。
export_annual_strategy: "cumulative"
# export_flat_datasets: "auto"  # auto/all=扫描目录，none=跳过，或逗号列表
# export_flat_exclude: ""       # 逗号分隔的排除数据集
# export_split_by: "none"       # 设为 year 时按年度拆分平面导出
# export_gzip: false            # out_format=csv 时输出 .csv.gz
# export_no_income: false       # 跳过 income 派生导出
# export_no_flat: false         # 跳过平面导出
# export_years 默认沿用 years；只导出缓存中已经存在的季度。
# export_years: 10
# export_strict=true 时导出失败会让 download 返回错误。
# export_strict: false
# allow_future=true 时允许请求尚未披露的未来季度。

# --- TuShare token ---
# 推荐使用 .env 或 shell 环境变量 TUSHARE_TOKEN。
# 只有无法使用环境变量时，才在这里填写 token。
# token: "your_tushare_token"
